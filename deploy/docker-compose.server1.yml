# Server A — Nginx (LB) + FastAPI + ARQ Worker + Uptime Kuma
# Usage: docker compose -f docker-compose.server1.yml up -d

services:
  # ── FastAPI backend ──────────────────────────────────────────
  app:
    build:
      context: ../fastapi-backend
      dockerfile: Dockerfile
    container_name: pm-api
    restart: unless-stopped
    env_file: ../fastapi-backend/.env.prod
    environment:
      - APP_ENV=prod
    ports:
      - "127.0.0.1:8001:8001"    # only reachable by Nginx on this host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── ARQ background worker ───────────────────────────────────
  worker:
    build:
      context: ../fastapi-backend
      dockerfile: Dockerfile
    container_name: pm-worker
    restart: unless-stopped
    env_file: ../fastapi-backend/.env.prod
    environment:
      - APP_ENV=prod
    command: ["uv", "run", "arq", "app.worker.WorkerSettings"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx load balancer ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: pm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro          # SSL certs (see SETUP.md)
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Uptime Kuma (monitoring dashboard) ──────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: pm-monitor
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  uptime-kuma-data:
