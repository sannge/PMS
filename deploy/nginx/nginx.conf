worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream backends ─────────────────────────────────────
    # ip_hash ensures WebSocket upgrades and subsequent requests
    # from the same client always reach the same backend.
    upstream api_backends {
        ip_hash;
        server app:8001;                    # Server A (local, via Docker network)
        server SERVER_B_IP:8001;            # Server B (remote — REPLACE THIS)
    }

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ── Redirect HTTP → HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Nginx own health check (stays on port 80)
        location = /nginx-health {
            access_log off;
            return 200 "ok";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — update paths to your cert and key
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        # ── API routes ────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://api_backends;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── WebSocket ─────────────────────────────────────────
        location /ws {
            proxy_pass         http://api_backends;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;     # keep WS alive 24h
            proxy_send_timeout 86400s;
        }

        # ── SSE (AI chat streaming) ──────────────────────────
        location /api/ai/chat/ {
            proxy_pass         http://api_backends;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;            # required for SSE
            proxy_cache        off;
            proxy_read_timeout 300s;           # agent can run up to 5 min
        }
    }
}
