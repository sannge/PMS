# Server B — FastAPI + ARQ Worker (no Nginx, no monitor)
# Usage: docker compose -f docker-compose.server2.yml up -d

services:
  # ── FastAPI backend ──────────────────────────────────────────
  app:
    build:
      context: ../fastapi-backend
      dockerfile: Dockerfile
    container_name: pm-api
    restart: unless-stopped
    env_file: ../fastapi-backend/.env.prod
    environment:
      - APP_ENV=prod
    ports:
      - "8001:8001"               # exposed to Server A's Nginx
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── ARQ background worker ───────────────────────────────────
  worker:
    build:
      context: ../fastapi-backend
      dockerfile: Dockerfile
    container_name: pm-worker
    restart: unless-stopped
    env_file: ../fastapi-backend/.env.prod
    environment:
      - APP_ENV=prod
    command: ["uv", "run", "arq", "app.worker.WorkerSettings"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
